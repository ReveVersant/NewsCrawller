<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Intelligence Hub</title>
    <style>
      :root {
        --bg: #f3f7f3;
        --panel: #ffffff;
        --ink: #17211f;
        --muted: #56635f;
        --accent: #1f8f68;
        --accent-2: #0f5f80;
        --warn: #a4551d;
        --border: #d8e2db;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: radial-gradient(circle at 10% 10%, #dbeee3 0%, var(--bg) 45%, #eef3f8 100%);
        font-family: "Segoe UI", "Aptos", Tahoma, sans-serif;
      }

      .wrap {
        width: min(1150px, 96vw);
        margin: 24px auto 40px;
      }

      .hero {
        background: linear-gradient(135deg, #083f44, #0b5956 55%, #14656f);
        color: #e8f8f5;
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 12px 26px rgba(6, 44, 53, 0.25);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.3rem, 1.9vw, 2rem);
      }

      .sub {
        margin-top: 8px;
        color: #bee3de;
        line-height: 1.4;
      }

      .controls {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 10px;
        align-items: end;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field label {
        font-size: 0.82rem;
        color: #d2f1ed;
      }

      button, select, input[type="text"] {
        border: 1px solid #74b1a5;
        border-radius: 10px;
        padding: 8px 10px;
        background: #ecf9f4;
        color: #0c3a3f;
        font-weight: 600;
      }

      input[type="range"] {
        width: 100%;
      }

      .inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .inline input[type="checkbox"] {
        transform: scale(1.1);
      }

      button {
        cursor: pointer;
        transition: transform 0.12s ease;
      }

      button:hover { transform: translateY(-1px); }

      .meta {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: #d2f1ed;
        font-size: 0.9rem;
      }

      .tags {
        margin-top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        font-size: 0.78rem;
        padding: 5px 8px;
        border-radius: 999px;
        background: rgba(232, 248, 245, 0.15);
        border: 1px solid rgba(232, 248, 245, 0.35);
      }

      .grid {
        margin-top: 20px;
        display: grid;
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 4px 10px rgba(23, 33, 31, 0.06);
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: baseline;
        justify-content: space-between;
      }

      .source {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .score {
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--accent-2);
        border: 1px solid #bcd7e3;
        background: #edf6fb;
        border-radius: 999px;
        padding: 2px 8px;
      }

      .title {
        margin: 8px 0 6px;
        font-size: 1.02rem;
      }

      .title a {
        color: #0d3f61;
        text-decoration: none;
      }

      .title a:hover { text-decoration: underline; }

      .summary {
        color: #33423f;
        margin: 0;
        line-height: 1.35;
      }

      .bottom {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .error {
        margin-top: 12px;
        background: #fff2e6;
        border: 1px solid #ffd4af;
        color: var(--warn);
        border-radius: 10px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>News Intelligence Hub</h1>
        <p class="sub">Track any topic, tune quality thresholds, and switch between High Signal and Discovery lanes.</p>

        <div class="controls">
          <div class="field" style="grid-column: 1 / -1;">
            <label for="topicsInput">Topics (comma-separated)</label>
            <input id="topicsInput" type="text" placeholder="e.g. conversational AI, voice bots, healthcare automation" />
          </div>

          <div class="field">
            <label for="lane">Lane</label>
            <select id="lane">
              <option value="high_signal">High Signal</option>
              <option value="discovery">Discovery</option>
            </select>
          </div>

          <div class="field">
            <label for="hours">Window</label>
            <select id="hours">
              <option value="24">Last 24h</option>
              <option value="48">Last 48h</option>
              <option value="72" selected>Last 72h</option>
              <option value="168">Last 7 days</option>
            </select>
          </div>

          <div class="field">
            <label for="max">Max items</label>
            <select id="max">
              <option value="80">80</option>
              <option value="120" selected>120</option>
              <option value="200">200</option>
            </select>
          </div>

          <div class="field">
            <label for="minScore">Min quality score: <span id="minScoreValue">45</span></label>
            <input id="minScore" type="range" min="0" max="100" value="45" step="1" />
          </div>

          <div class="field">
            <label>Relevance mode</label>
            <label class="inline">
              <input id="strictMode" type="checkbox" checked />
              <span>Strict topic matching</span>
            </label>
          </div>

          <div class="field">
            <label>&nbsp;</label>
            <button id="refreshBtn">Refresh Feed</button>
          </div>
        </div>

        <div class="meta">
          <span id="status">Waiting for first refresh...</span>
          <span id="count">0 items</span>
          <span id="mode">Mode: detecting...</span>
        </div>

        <div id="keywords" class="tags"></div>
      </section>

      <section id="errors"></section>
      <section id="results" class="grid"></section>
    </main>

    <script>
      const DEFAULT_TOPICS = [
        "conversational ai",
        "chatbots",
        "voice bots",
        "digital automation",
        "agentic ai"
      ];

      const LANE_PRESETS = {
        high_signal: {
          label: "High Signal",
          minScore: 45,
          strict: true
        },
        discovery: {
          label: "Discovery",
          minScore: 18,
          strict: false
        }
      };

      const refreshBtn = document.getElementById("refreshBtn");
      const topicsInput = document.getElementById("topicsInput");
      const laneEl = document.getElementById("lane");
      const hoursEl = document.getElementById("hours");
      const maxEl = document.getElementById("max");
      const minScoreEl = document.getElementById("minScore");
      const minScoreValueEl = document.getElementById("minScoreValue");
      const strictModeEl = document.getElementById("strictMode");

      const statusEl = document.getElementById("status");
      const countEl = document.getElementById("count");
      const modeEl = document.getElementById("mode");
      const resultsEl = document.getElementById("results");
      const errorsEl = document.getElementById("errors");
      const keywordsEl = document.getElementById("keywords");

      function parseTopics(raw) {
        const unique = new Set();
        String(raw || "")
          .split(/[\n,]+/)
          .map((x) => x.trim())
          .filter(Boolean)
          .forEach((topic) => unique.add(topic.toLowerCase()));
        return [...unique].slice(0, 12);
      }

      function applyLanePreset(lane) {
        const preset = LANE_PRESETS[lane] || LANE_PRESETS.high_signal;
        minScoreEl.value = String(preset.minScore);
        minScoreValueEl.textContent = String(preset.minScore);
        strictModeEl.checked = preset.strict;
      }

      function readState() {
        const saved = JSON.parse(localStorage.getItem("newsHubState") || "{}");
        const lane = saved.lane === "discovery" ? "discovery" : "high_signal";
        const preset = LANE_PRESETS[lane];
        return {
          topics: Array.isArray(saved.topics) && saved.topics.length ? saved.topics : DEFAULT_TOPICS,
          lane,
          hours: saved.hours || "72",
          max: saved.max || "120",
          minScore: Number.isFinite(saved.minScore) ? saved.minScore : preset.minScore,
          strict: typeof saved.strict === "boolean" ? saved.strict : preset.strict
        };
      }

      function writeState() {
        localStorage.setItem(
          "newsHubState",
          JSON.stringify({
            topics: parseTopics(topicsInput.value),
            lane: laneEl.value,
            hours: hoursEl.value,
            max: maxEl.value,
            minScore: Number(minScoreEl.value),
            strict: strictModeEl.checked
          })
        );
      }

      function fmtDate(raw) {
        if (!raw) return "Unknown publish time";
        const dt = new Date(raw);
        if (Number.isNaN(dt.getTime())) return raw;
        return dt.toLocaleString();
      }

      function parseTs(raw) {
        const ts = Date.parse(raw || "");
        return Number.isNaN(ts) ? null : ts;
      }

      function renderErrors(errors) {
        errorsEl.innerHTML = "";
        if (!errors || errors.length === 0) return;

        const div = document.createElement("div");
        div.className = "error";
        div.textContent = `Some feeds failed this refresh: ${errors.slice(0, 5).join(" | ")}`;
        errorsEl.appendChild(div);
      }

      function renderKeywords(keywords) {
        keywordsEl.innerHTML = "";
        (keywords || []).forEach((kw) => {
          const span = document.createElement("span");
          span.className = "tag";
          span.textContent = kw;
          keywordsEl.appendChild(span);
        });
      }

      function renderItems(items) {
        resultsEl.innerHTML = "";

        if (!items || items.length === 0) {
          const card = document.createElement("article");
          card.className = "card";
          card.textContent = "No high-value items matched these settings. Lower min quality or switch to Discovery lane.";
          resultsEl.appendChild(card);
          return;
        }

        items.forEach((item) => {
          const card = document.createElement("article");
          card.className = "card";

          card.innerHTML = `
            <div class="top">
              <span class="source">${item.source} (${item.source_type}) ${item.domain ? "- " + item.domain : ""}</span>
              <span class="score">Quality ${item.score}</span>
            </div>
            <h2 class="title"><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a></h2>
            <p class="summary">${item.summary || "No summary available."}</p>
            <div class="bottom">Published: ${fmtDate(item.published)}</div>
          `;

          resultsEl.appendChild(card);
        });
      }

      function localTopicHits(item, topics) {
        const title = String(item.title || "").toLowerCase();
        const summary = String(item.summary || "").toLowerCase();
        return topics.reduce((acc, t) => acc + (title.includes(t) ? 2 : 0) + (summary.includes(t) ? 1 : 0), 0);
      }

      function filterStaticPayload(snapshot, hours, max, topics, minScore, strict, lane) {
        const now = Date.now();
        const cutoffMs = hours * 60 * 60 * 1000;

        const items = (snapshot.items || [])
          .map((item) => {
            const hits = localTopicHits(item, topics);
            const base = Number(item.score) || 0;
            const adjusted = base + (hits * 8) - (hits === 0 ? 20 : 0);
            return { ...item, score: adjusted };
          })
          .filter((item) => {
            const ts = parseTs(item.published);
            if (ts !== null && (now - ts) > cutoffMs) return false;
            if (strict && localTopicHits(item, topics) === 0) return false;
            return item.score >= minScore;
          })
          .sort((a, b) => {
            const scoreDiff = (b.score || 0) - (a.score || 0);
            if (scoreDiff !== 0) return scoreDiff;
            return (parseTs(b.published) || 0) - (parseTs(a.published) || 0);
          })
          .slice(0, max);

        return {
          generated_at: snapshot.generated_at,
          tracked_keywords: topics,
          topics_used: topics,
          lane_applied: lane,
          min_score_applied: minScore,
          strict_mode: strict,
          errors: snapshot.errors || [],
          count: items.length,
          items,
        };
      }

      async function fetchLive(hours, max, topics, minScore, strict, lane) {
        const qs = new URLSearchParams({
          hours: String(hours),
          max: String(max),
          topics: topics.join(","),
          min_score: String(minScore),
          strict: strict ? "1" : "0",
          lane
        });

        const resp = await fetch(`/api/news?${qs.toString()}`, { cache: "no-store" });
        if (!resp.ok) {
          const msg = (await resp.text()).slice(0, 160);
          throw new Error(`Live API HTTP ${resp.status}${msg ? `: ${msg}` : ""}`);
        }
        return resp.json();
      }

      async function fetchStatic(hours, max, topics, minScore, strict, lane) {
        const resp = await fetch("./news.json", { cache: "no-store" });
        if (!resp.ok) throw new Error(`Static JSON HTTP ${resp.status}`);
        const snapshot = await resp.json();
        return filterStaticPayload(snapshot, Number(hours), Number(max), topics, Number(minScore), strict, lane);
      }

      async function refresh() {
        writeState();

        const hours = Number(hoursEl.value);
        const max = Number(maxEl.value);
        const topics = parseTopics(topicsInput.value);
        const minScore = Number(minScoreEl.value);
        const strict = strictModeEl.checked;
        const lane = laneEl.value;

        statusEl.textContent = "Refreshing...";

        try {
          let payload;
          let liveError = null;
          try {
            payload = await fetchLive(hours, max, topics, minScore, strict, lane);
            modeEl.textContent = "Mode: live API (Netlify/server)";
          } catch (err) {
            liveError = err;
            payload = await fetchStatic(hours, max, topics, minScore, strict, lane);
            modeEl.textContent = "Mode: static snapshot fallback";
          }

          const mergedErrors = [...(payload.errors || [])];
          if (liveError) {
            mergedErrors.unshift(`Live API unavailable (${liveError.message}). Showing static snapshot.`);
          }

          const laneName = payload.lane_applied === "discovery" ? "Discovery" : "High Signal";

          renderKeywords(payload.topics_used || payload.tracked_keywords || topics);
          renderErrors(mergedErrors);
          renderItems(payload.items);
          countEl.textContent = `${payload.count} items (${laneName}, min quality ${payload.min_score_applied ?? minScore})`;
          statusEl.textContent = payload.generated_at
            ? `Updated ${new Date(payload.generated_at).toLocaleString()}`
            : "Updated";
        } catch (err) {
          statusEl.textContent = `Refresh failed: ${err.message}`;
          modeEl.textContent = "Mode: no data";
        }
      }

      function initializeControls() {
        const state = readState();
        topicsInput.value = state.topics.join(", ");
        laneEl.value = state.lane;
        hoursEl.value = state.hours;
        maxEl.value = state.max;
        minScoreEl.value = String(state.minScore);
        minScoreValueEl.textContent = String(state.minScore);
        strictModeEl.checked = state.strict;
      }

      laneEl.addEventListener("change", () => {
        applyLanePreset(laneEl.value);
        writeState();
      });

      minScoreEl.addEventListener("input", () => {
        minScoreValueEl.textContent = minScoreEl.value;
        writeState();
      });

      [topicsInput, hoursEl, maxEl, strictModeEl].forEach((el) => {
        el.addEventListener("change", writeState);
      });

      refreshBtn.addEventListener("click", refresh);

      initializeControls();
      refresh();
      setInterval(refresh, 1000 * 60 * 10);
    </script>
  </body>
</html>
